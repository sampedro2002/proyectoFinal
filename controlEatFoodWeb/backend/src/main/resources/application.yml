server:
  port: 3000
  servlet:
    context-path: /
  # Respeta X-Forwarded-Proto de un proxy inverso (nginx/PUBLIC_URL con TLS) para que
  # request.isSecure() sea correcto y la cookie httpOnly de refresh se marque Secure.
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  application:
    name: control-eat-food
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/control_almuerzos?createDatabaseIfNotExist=true&serverTimezone=America/Guayaquil}
    username: ${DB_USER:admin}
    # Placeholder no funcional: nunca un secreto real. Debe definirse DB_PASSWORD por
    # variable de entorno; StartupSecurityValidator bloquea el arranque en prod si no se hizo.
    password: ${DB_PASSWORD:changeme-set-DB_PASSWORD-env-var}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Guayaquil
        # Para columnas OffsetDateTime en MySQL (sin tipo "timestamp with time zone"),
        # el default de Hibernate 6 es NORMALIZE_UTC → guarda en UTC e IGNORA jdbc.time_zone,
        # dejando las horas 5h adelantadas respecto a Ecuador. NORMALIZE respeta jdbc.time_zone
        # (America/Guayaquil) y guarda/lee la hora local, consistente con business_date.
        timezone:
          default_storage: NORMALIZE
    open-in-view: false
  flyway:
    enabled: true
    # baseline-on-migrate=true permite convivir con los scripts del instalador
    # (RunWindowns\db\01_esquema.sql + 02_datos.sql):
    #  - BD vacía: Flyway migra normalmente desde V1 (baseline no aplica).
    #  - BD con estructura creada por los scripts (sin flyway_schema_history):
    #    Flyway la "baselinea" en la versión 2 y NO re-ejecuta V1..V2.
    #  - BD con historial Flyway existente: se comporta igual que siempre.
    # baseline-version debe subir cuando se agregue una migración que los
    # scripts del instalador ya incluyan consolidada.
    baseline-on-migrate: true
    baseline-version: 2
    locations: classpath:db/migration
    # Debe estar en false para que app.dev.flyway-clean-on-start pueda limpiar el esquema.
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}
  jackson:
    time-zone: America/Guayaquil
    serialization:
      write-dates-as-timestamps: false

app:
  dev:
    # Si es true, borra TODO el esquema (flyway clean) antes de migrar en cada arranque.
    # Requiere ademas spring.flyway.clean-disabled=false (FLYWAY_CLEAN_DISABLED=false).
    # Dejar en false salvo que se necesite forzar una recreacion limpia puntual.
    flyway-clean-on-start: ${FLYWAY_CLEAN_ON_START:false}
  # URL pública canónica del backend (sin /api). Defínala en despliegues con dominio/proxy
  # inverso, p. ej. PUBLIC_URL=https://catering.midominio.com. Vacío = se detecta por red/petición.
  public-url: ${PUBLIC_URL:}
  security:
    jwt:
      # Clave en Base64 de al menos 256 bits. Sustituir en producción vía variable de entorno.
      secret: ${JWT_SECRET:Y29udHJvbC1lYXQtZm9vZC1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==}
      access-token-minutes: 30
      refresh-token-days: 7
    brute-force:
      max-attempts: 5
      lock-minutes: 15
  restaurant:
    max-devices: 2
  biometric:
    provider: ${BIOMETRIC_PROVIDER:zk}
    match-threshold: 70
    # Clave AES (mín. 16 bytes) para cifrar plantillas biométricas en BD.
    # En producción defina BIOMETRIC_ENCRYPTION_KEY con un valor aleatorio.
    encryption-key: ${BIOMETRIC_ENCRYPTION_KEY:}
    # Ruta donde se encuentran las librerías nativas del SDK ZKFinger (libzkfp.dll / .so)
    native-lib-path: ${ZK_NATIVE_PATH:./native}
  # Archivo donde se anotan usuario/contraseña generados al azar en el primer arranque de
  # producción (ver DataInitializer). Vacío = no se escribe archivo (solo queda en el log).
  credentials-file: ${CREDENTIALS_FILE:}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4173,http://localhost:5173,http://localhost:5174}
  rate-limit:
    # Límite por IP y por minuto para endpoints sensibles. Deshabilitable con RATE_LIMIT_ENABLED=false.
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-per-minute: ${RATE_LIMIT_AUTH:10}
    scan-per-minute: ${RATE_LIMIT_SCAN:60}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.eatfood: DEBUG
    org.springframework.security: WARN
