server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024

spring:
  application:
    name: control-eat-food
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/control_eat_food?createDatabaseIfNotExist=true&serverTimezone=America/Guayaquil}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:BN2002sg}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Guayaquil
        # Para columnas OffsetDateTime en MySQL (sin tipo "timestamp with time zone"),
        # el default de Hibernate 6 es NORMALIZE_UTC → guarda en UTC e IGNORA jdbc.time_zone,
        # dejando las horas 5h adelantadas respecto a Ecuador. NORMALIZE respeta jdbc.time_zone
        # (America/Guayaquil) y guarda/lee la hora local, consistente con business_date.
        timezone:
          default_storage: NORMALIZE
    open-in-view: false
  flyway:
    enabled: true
    # Para una base de datos nueva/limpia, cambie baseline-on-migrate a false (o coméntelo).
    # Si es una base de datos existente con tablas creadas manualmente, cambie a true y use baseline-version: 2.
    baseline-on-migrate: false
    locations: classpath:db/migration
  jackson:
    time-zone: America/Guayaquil
    serialization:
      write-dates-as-timestamps: false

app:
  # URL pública canónica del backend (sin /api). Defínala en despliegues con dominio/proxy
  # inverso, p. ej. PUBLIC_URL=https://catering.midominio.com. Vacío = se detecta por red/petición.
  public-url: ${PUBLIC_URL:}
  security:
    jwt:
      # Clave en Base64 de al menos 256 bits. Sustituir en producción vía variable de entorno.
      secret: ${JWT_SECRET:Y29udHJvbC1lYXQtZm9vZC1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==}
      access-token-minutes: 30
      refresh-token-days: 7
    brute-force:
      max-attempts: 5
      lock-minutes: 15
  restaurant:
    max-devices: 2
  biometric:
    provider: ${BIOMETRIC_PROVIDER:zk}
    match-threshold: 70
    # Clave AES (mín. 16 bytes) para cifrar plantillas biométricas en BD.
    # En producción defina BIOMETRIC_ENCRYPTION_KEY con un valor aleatorio.
    encryption-key: ${BIOMETRIC_ENCRYPTION_KEY:}
    # Ruta donde se encuentran las librerías nativas del SDK ZKFinger (libzkfp.dll / .so)
    native-lib-path: ${ZK_NATIVE_PATH:./native}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:4173}
  rate-limit:
    # Límite por IP y por minuto para endpoints sensibles. Deshabilitable con RATE_LIMIT_ENABLED=false.
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth-per-minute: ${RATE_LIMIT_AUTH:10}
    scan-per-minute: ${RATE_LIMIT_SCAN:60}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.eatfood: DEBUG
    org.springframework.security: WARN
